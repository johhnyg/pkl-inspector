name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Test CLI
        run: |
          # Create a test pickle
          python -c "import pickle; pickle.dump([1,2,3], open('test.pkl', 'wb'))"
          # Run pkl-inspector
          python pkl_inspector.py test.pkl
          # Verify exit code 0 for clean file
          python pkl_inspector.py test.pkl && echo "Clean file detected correctly"

      - name: Test malicious detection
        run: |
          # Create malicious pickle
          python -c "
          import pickle
          import os
          class Mal:
              def __reduce__(self):
                  return (os.system, ('echo test',))
          pickle.dump(Mal(), open('mal.pkl', 'wb'))
          "
          # Run pkl-inspector - should exit non-zero
          python pkl_inspector.py mal.pkl && exit 1 || echo "Malicious file detected correctly"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: |
          python -m py_compile pkl_inspector.py
          python -m py_compile pkl_inspector_demo.py
          python -m py_compile tests/test_pkl_inspector.py
